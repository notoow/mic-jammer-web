<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mic-jammer-web</title>
    <meta
      name="description"
      content="Minimal GitHub Pages landing page for mic-jammer-web"
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing">
      <section class="console" data-state="off" aria-label="Jamming control panel">
        <div class="console-top">
          <div class="plate-title">
            <span class="plate-kicker">tactical console</span>
            <strong>mic-jammer-web</strong>
          </div>
          <div class="status-box" aria-live="polite">
            <span class="status-led" aria-hidden="true"></span>
            <span class="status-label" id="status-label">SAFE</span>
          </div>
        </div>

        <button
          class="hero-button"
          id="toggle-button"
          type="button"
          aria-label="Toggle jamming button concept"
          aria-pressed="false"
        >
          <span class="button-rim">
            <span class="button-face">
              <span class="button-word" id="button-word">JAM</span>
            </span>
          </span>
        </button>

        <div class="console-bottom">
          <span class="mode-tag">mode</span>
          <span class="mode-value" id="mode-value">standby</span>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
